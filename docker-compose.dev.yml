services:
  frontend:
    build:
      context: ./frontend/Lastnext
      dockerfile: Dockerfile.dev
    container_name: nextjs-frontend-dev
    env_file:
      - .env.local
    volumes:
      - ./frontend/Lastnext:/app
      - /app/node_modules
      - /app/.next
    environment:
      - AUTH0_BASE_URL=http://localhost:3000
      - NEXT_PUBLIC_AUTH0_BASE_URL=http://localhost:3000
      - APP_BASE_URL=http://localhost:3000
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PRIVATE_API_URL=http://backend:8000
      - NEXT_PUBLIC_MEDIA_URL=http://localhost:8000
      - API_URL=http://backend:8000
      - NODE_ENV=development
    command: npm run dev -- --hostname 0.0.0.0
    ports:
      - "3000:3000"
    depends_on:
      - backend
      - db
    networks:
      - dev-network

  backend:
    build: 
      context: ./backend/myLubd
      dockerfile: Dockerfile
    container_name: django-backend-dev
    env_file:
      - .env.local
    volumes:
      - ./backend/myLubd/src:/app
      - media_volume_dev:/app/media
      - static_volume_dev:/app/static
    environment:
      - DJANGO_SETTINGS_MODULE=myLubd.settings
      - PYTHONPATH=/app
      - DEBUG=1
      - DJANGO_ALLOWED_HOSTS=localhost,127.0.0.1,backend,0.0.0.0
      - DJANGO_CORS_ORIGINS=http://localhost:3000
      - SQL_ENGINE=django.db.backends.postgresql
      - SQL_DATABASE=${SQL_DATABASE:-mylubd_db}
      - SQL_USER=${SQL_USER:-mylubd_user}
      - SQL_HOST=db
      - SQL_PORT=5432
      - EMAIL_HOST=smtp.gmail.com
      - EMAIL_PORT=587
      - EMAIL_USE_TLS=True
      - DEFAULT_FROM_EMAIL=${DEFAULT_FROM_EMAIL:-no-reply@hotelcarepro.com}
      - EMAIL_REQUIRE_AUTH=True
      - APP_BASE_URL=http://localhost:3000
    ports:
      - "8000:8000"
    depends_on:
      - db
    command: python manage.py runserver 0.0.0.0:8000
    networks:
      - dev-network

  db:
    image: postgres:17-alpine
    container_name: db-dev
    env_file:
      - .env.local
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-mylubd_db}
      - POSTGRES_USER=${POSTGRES_USER:-mylubd_user}
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data_v17:/var/lib/postgresql/data/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mylubd_user} -d ${POSTGRES_DB:-mylubd_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dev-network

networks:
  dev-network:
    driver: bridge

volumes:
  postgres_dev_data_v17:
    driver: local
  static_volume_dev:
    driver: local
  media_volume_dev:
    driver: local
  frontend_node_modules:
    driver: local
  frontend_next_cache:
    driver: local
